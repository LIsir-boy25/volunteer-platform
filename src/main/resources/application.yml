server:
  port: 9090  # ✅ 后端端口固定为 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ⚠️ 请确认数据库密码是否正确
    url: jdbc:mysql://localhost:3306/volunteer_platform?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件限制
      max-request-size: 20MB   # 总请求限制

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ✅ 文件存储配置 (注意缩进：files顶格)
files:
  upload:
    path: D:/volunteer_data/files/