server:
  port: 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ⚠️ 确认你的数据库密码是 root
    url: jdbc:mysql://localhost:3306/volunteer_platform?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ✅ 加回文件上传配置，使用动态路径，绝对不会再报找不到路径的错！
files:
  upload:
    path: ${user.dir}/files/