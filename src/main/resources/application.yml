server:
  port: 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ⚠️ 确认你的数据库密码是 root
    url: jdbc:mysql://localhost:3306/volunteer_platform?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
    username: root
    password: root

  # 🌟 核心修复：Spring Boot 3 专属的 Redis 配置前缀 spring.data.redis
  data:
    redis:
      host: 127.0.0.1      # Redis 服务器地址
      port: 6379           # Redis 默认端口
      password:            # 没密码就空着
      database: 0          # 默认使用 0 号库
      lettuce:
        pool:
          max-active: 8    # 连接池最大连接数
          max-wait: -1ms   # 连接池最大阻塞等待时间
          max-idle: 8      # 连接池中的最大空闲连接
          min-idle: 0      # 连接池中的最小空闲连接

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ✅ 加回文件上传配置，使用动态路径，绝对不会再报找不到路径的错！
files:
  upload:
    path: ${user.dir}/files/